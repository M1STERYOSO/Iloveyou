<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff4d88;
            cursor: pointer;
            font-weight: bold;
        }

        #message {
            margin-top: 25px;
            font-size: 2rem;
            color: white;
            display: none;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-500px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>❤️ Always remember my love❤️</h1>

    <button onclick="showLove()">
        Click Me 💕
    </button>

    <div id="message">
        MAHAL NA MAHAL NA MAHAL KITAAAAA
    </div>
</div>

<script>
    function showLove() {
        document.getElementById("message").style.display = "block";

        for(let i = 0; i < 20; i++) {
            let heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.className = "heart";

            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    }
</script>

</body>
</html>
